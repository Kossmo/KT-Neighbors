<article
  class="species-card"
  [class.species-card--selected]="selected()"
  (click)="cardSelected.emit()"
  role="button"
  [attr.aria-pressed]="selected()"
  tabindex="0"
  (keyup.enter)="cardSelected.emit()"
  (keyup.space)="cardSelected.emit()"
>
  <!-- Photo or placeholder -->
  <div class="species-card__photo">
    @if (photoUrl && !photoError()) {
      <img
        [src]="photoUrl"
        [alt]="species().scientificName"
        (error)="onPhotoError()"
        loading="lazy"
      />
    } @else {
      <div class="species-card__photo-placeholder" aria-hidden="true">
        <svg viewBox="0 0 40 40">
          <circle cx="20" cy="14" r="6" stroke="currentColor" stroke-width="1" fill="none" opacity="0.4"/>
          <path d="M8 36 Q20 22 32 36" stroke="currentColor" stroke-width="1" fill="none" opacity="0.4"/>
          <path d="M20 20 Q24 26 20 32 Q16 26 20 20Z" fill="currentColor" opacity="0.15"/>
        </svg>
      </div>
    }
  </div>

  <!-- Text content -->
  <div class="species-card__body">
    <h3 class="species-card__name">{{ displayName }}</h3>
    @if (latinName) {
      <p class="species-card__latin">{{ latinName }}</p>
    }
    <div class="species-card__meta">
      <span class="species-card__count">{{ species().occurrenceCount }}×</span>
      @if (species().kingdom) {
        <span class="species-card__kingdom">{{ species().kingdom }}</span>
      }
    </div>
  </div>

  <!-- Detail button — visible, labelled -->
  <button
    class="species-card__detail-btn"
    (click)="$event.stopPropagation(); detailRequested.emit()"
    aria-label="See details for {{ displayName }}"
    tabindex="-1"
  >
    <span>Details</span>
    <svg viewBox="0 0 12 12" aria-hidden="true">
      <path d="M2 6h8M6 2l4 4-4 4" stroke="currentColor" stroke-width="1.3"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
  </button>
</article>
