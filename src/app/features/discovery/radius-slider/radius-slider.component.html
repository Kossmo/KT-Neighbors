<div class="radius-slider">
  <button class="radius-toggle" (click)="toggle()" [attr.aria-expanded]="expanded()">
    <svg viewBox="0 0 16 16" aria-hidden="true">
      <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.2" fill="none"/>
      <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="0.8" fill="none" stroke-dasharray="3 2"/>
    </svg>
    <span>{{ currentValue() }} km radius</span>
    <svg class="radius-toggle__chevron" [class.radius-toggle__chevron--open]="expanded()"
      viewBox="0 0 12 12" aria-hidden="true">
      <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.2"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
  </button>

  @if (expanded()) {
    <div class="radius-panel">
      <div class="radius-panel__row">
        <span class="radius-panel__label">1 km</span>
        <input
          class="radius-panel__input"
          type="range"
          min="1"
          max="10"
          step="1"
          [value]="localValue()"
          (input)="onSliderInput($event)"
          aria-label="Search radius in kilometres"
        />
        <span class="radius-panel__label">10 km</span>
      </div>
      <p class="radius-panel__value">{{ localValue() }} km</p>
    </div>
  }
</div>
