<div class="habitat" #wrapEl>

  <svg class="habitat__svg" #svgEl></svg>

  <!-- HUD -->
  <header class="habitat__hud">
    <button class="habitat__back" (click)="goBack()" aria-label="Back">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M19 12H5M11 6l-6 6 6 6" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </button>
    <div class="habitat__title">
      <p class="habitat__location">{{ locationName() || 'Your area' }}</p>
      <p class="habitat__subtitle">{{ speciesCount() }} species sharing your habitat</p>
    </div>
  </header>

  <!-- Legend -->
  <div class="habitat__legend">
    <span class="habitat__legend-item">
      <span class="habitat__swatch habitat__swatch--genus"></span>Same genus
    </span>
    <span class="habitat__legend-item">
      <span class="habitat__swatch habitat__swatch--family"></span>Same family
    </span>
  </div>

  <!-- Tooltip -->
  @if (tooltip(); as tip) {
    <div class="habitat__tooltip">
      @if (tip.photo) {
        <img class="habitat__tooltip-img" [src]="tip.photo" alt="" />
      }
      <div class="habitat__tooltip-body">
        <p class="habitat__tooltip-name">{{ tip.name }}</p>
        @if (tip.name !== tip.scientificName) {
          <p class="habitat__tooltip-sci"><em>{{ tip.scientificName }}</em></p>
        }
        <p class="habitat__tooltip-meta">{{ tip.family }} · {{ tip.count }} obs.</p>
      </div>
    </div>
  }

</div>
